<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minhas Agendas - Med+</title>
  <link rel="icon" type="image/png" href="../assets/M+ logo.png">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../CSS/marcadas.css">
  <link rel="stylesheet" href="../CSS/perfil.css">
</head>
<body>

<header>
  <div class="container header">
    <img src="../assets/logo_medplus.png" class="logo">

    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="especialidades.html">Especialidades</a></li>
        <li><a href="agendas.html">Agendar</a></li>
        <li><a href="../index.html#contato">Contato</a></li>
      </ul>
    </nav>

<div class="actions">
  <div id="userArea">
    <button id="openModal" class="btn-primary">Entrar</button>
  </div>
</div>
  </div>
</header>

<section class="marcadas-page">
  <div class="container">

    <h2 id="welcomeText">Bem-vindo</h2>

    <div id="agendamentosList" class="agendamentos-grid"></div>

  </div>
</section>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <h3>Entrar</h3>

    <input type="text" placeholder="Nome de Usuário">
    <input type="password" placeholder="Senha">

    <p class="register-text">
    Não tem conta? <span id="goRegister">Cadastre-se</span>
    </p>

    <div class="modal-buttons">
      <button id="closeModal" class="btn-outline">Cancelar</button>
      <button class="btn-primary">Entrar</button>
    </div>
  </div>
</div>
<!-- REGISTER MODAL -->
<div id="registerModal" class="modal">
  <div class="modal-content">
    <h3>Cadastrar</h3>

    <input id="regUser" type="text" placeholder="Nome de Usuário">
    <input id="regPass" type="password" placeholder="Senha">
    <input id="regConfirm" type="password" placeholder="Confirmar Senha">

    <div class="modal-buttons">
      <button id="closeRegister" class="btn-outline">Cancelar</button>
      <button id="registerSubmit" class="btn-primary">Cadastrar</button>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="profile-modal">

  <div class="profile-content">

    <h2>Meu Perfil</h2>

    <div class="profile-top">

      <div class="profile-avatar-wrapper">

      <div id="profileAvatar" class="profile-avatar">
        U
      </div>

      <div class="avatar-overlay">
        ✎
      </div>

    </div>

      <div class="profile-fields">

        <input
          type="text"
          id="profileName"
          placeholder="Nome"
        >

        <input
          type="text"
          id="profileLastName"
          placeholder="Sobrenome"
        >

      </div>

    </div>

    <div id="avatarEditor" class="avatar-editor">

  <h3>Personalizar Avatar</h3>

  <div class="avatar-types">

    <button
      class="avatar-option"
      data-avatar="initial"
    >
      Inicial
    </button>

    <button
      class="avatar-option"
      data-avatar="male"
    >
      Masculino
    </button>

    <button
      class="avatar-option"
      data-avatar="female"
    >
      Feminino
    </button>

  </div>

  <div class="avatar-colors">

    <div class="color-option" data-color="#2a7fff"></div>

    <div class="color-option" data-color="#ff4d6d"></div>

    <div class="color-option" data-color="#8b5cf6"></div>

    <div class="color-option" data-color="#10b981"></div>

    <div class="color-option" data-color="#f59e0b"></div>

    <div class="color-option" data-color="#111827"></div>

  </div>

</div>

    <div class="profile-buttons">
      <button id="cancelProfile" class="btn-outline">
        Cancelar
      </button>

      <button id="saveProfile" class="btn-primary">
        Salvar
      </button>
    </div>

  </div>

</div>
<!-- SIDEBAR USUÁRIO -->
<div id="userSidebar" class="sidebar">
  <div class="sidebar-content">
    <div class="sidebar-user">
    <div id="sidebarAvatar" class="avatar"></div>
    <h3 id="userName">Usuário</h3>
    </div>

    <ul id="sidebarMenu">
      <li id="openProfile">Perfil</li>
      <li id="goAgendas">Agendas</li>
      <li id="openNotifications">
        Notificações
        <span id="notificationBadge" class="notification-badge">0</span>
      </li>
      <li id="logoutBtn">Sair</li>
    </ul>

    <div id="notificationsPanel" class="notifications-panel">
  <div class="notifications-header">
    <button id="backSidebar">← Voltar</button>
      <button id="clearNotifications">Limpar</button>
  </div>

  <div id="notificationsList"></div>
</div>
  </div>
</div>

<script src="../script.js"></script>
<script src="../SCRIPTS/marcadas.js"></script>
<script src="../SCRIPTS/perfil.js"></script>
</body>
</html>
